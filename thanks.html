<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>仮申し込みを受け付けました | パソコン太郎メゾットAI講習会 初級編</title>
  <style>
    :root {
      --red: #d1001a;
      --ink: #15171a;
      --muted: #626874;
      --line: #dfe3ea;
      --gold: #d6aa42;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(209,0,26,0.12), rgba(214,170,66,0.12)),
        #f7f8fb;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      line-height: 1.7;
    }
    main {
      width: min(720px, 100%);
      padding: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(20, 24, 32, 0.12);
    }
    .label {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      color: #ffffff;
      background: var(--red);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
    }
    h1 {
      margin: 18px 0 12px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.18;
    }
    p { margin: 0 0 14px; color: var(--muted); }
    strong { color: var(--ink); }
    .next {
      margin: 22px 0;
      padding: 18px;
      border-left: 5px solid var(--gold);
      background: #fff8e8;
      color: var(--ink);
      font-weight: 800;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 8px;
      color: #ffffff;
      background: var(--red);
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="label">PRE-ENTRY RECEIVED</div>
    <h1>仮申し込みを受け付けました。</h1>
    <p><strong>この時点では本申込確定ではありません。</strong></p>
    <p>日程、参加人数、持ち込みファイル、参加条件、助成金確認の状況を確認したうえで、本申込へ進みます。</p>
    <div class="next">担当より、内容確認のご連絡をいたします。助成金を検討する場合は、顧問社労士または管轄労働局への事前確認もあわせてご準備ください。</div>
    <p>第1期は2026年10月15日(木)・16日(金)、宇都宮開催。最大12人限定、1社4名までです。</p>
    <a href="./">LPに戻る</a>
  </main>
</body>
</html>
