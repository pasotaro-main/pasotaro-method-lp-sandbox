name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Gemini chat config
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const apiKey = process.env.GEMINI_API_KEY || '';
          fs.mkdirSync('assets', { recursive: true });
          fs.writeFileSync('assets/chat-config.js', [
            'window.PASOTARO_GEMINI_CHAT_ENDPOINT = window.PASOTARO_GEMINI_CHAT_ENDPOINT || "";',
            `window.PASOTARO_GEMINI_API_KEY = ${JSON.stringify(apiKey)};`,
            'window.PASOTARO_GEMINI_MODEL = window.PASOTARO_GEMINI_MODEL || "gemini-2.5-flash";',
            ''
          ].join('\n'));
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
